<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Todo List Pro</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      width: 420px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      padding: 8px;
      resize: none;
      height: 40px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .add-btn { background: #4CAF50; color: white; }
    .reset-btn { background: red; color: white; width: 100%; margin-top: 10px; }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #eee;
      margin-bottom: 10px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .task-text {
      white-space: pre-line;
      flex: 1;
    }

    .actions button {
      margin-left: 5px;
    }

    .edit-btn { background: orange; color: white; }
    .delete-btn { background: crimson; color: white; }
  </style>
</head>
<body>

<div class="app">
  <h2>Todo List Pro 😎</h2>

  <div class="input-group">
    <textarea id="taskInput" placeholder="Enter"></textarea>
    <button class="add-btn" onclick="addTask()">Thêm</button>
  </div>

  <ul id="taskList"></ul>

  <button class="reset-btn" onclick="resetTasks()">Reset tất cả</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");

      li.innerHTML = `
        <span class="task-text">${task}</span>
        <div class="actions">
          <button class="edit-btn" onclick="editTask(${index})">Sửa</button>
          <button class="delete-btn" onclick="deleteTask(${index})">Xóa</button>
        </div>
      `;

      list.appendChild(li);
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const value = input.value.trim();

    if (!value) return;

    tasks.push(value);
    saveTasks();
    renderTasks();

    input.value = "";
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  function editTask(index) {
    const newTask = prompt("Sửa công việc:", tasks[index]);
    if (newTask !== null && newTask.trim() !== "") {
      tasks[index] = newTask.trim();
      saveTasks();
      renderTasks();
    }
  }

  function resetTasks() {
    if (confirm("Xóa hết thật không bro? 😏")) {
      tasks = [];
      saveTasks();
      renderTasks();
    }
  }

  // 🔥 Enter = thêm | Shift+Enter = xuống dòng
  document.getElementById("taskInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      addTask();
    }
  });

  renderTasks();
</script>

</body>
</html>
