<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Todo List Pro</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        padding: 50px;
        min-height: 100vh;
      }

      /* Card chính */
      .app {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 20px;
        width: 420px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
      }

      .app:hover {
        transform: translateY(-5px);
      }

      /* Title */
      h2 {
        text-align: center;
        color: #333;
      }

      /* Input */
      .input-group {
        display: flex;
        gap: 10px;
      }

      textarea {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
      }

      textarea:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
      }

      /* Button */
      button {
        padding: 8px 14px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        transition: 0.2s;
      }

      button:active {
        transform: scale(0.95);
      }

      .add-btn {
        background: linear-gradient(135deg, #42e695, #3bb2b8);
        color: white;
      }

      .reset-btn {
        background: linear-gradient(135deg, #ff4e50, #f00000);
        color: white;
        width: 100%;
        margin-top: 10px;
      }

      /* List */
      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        background: white;
        margin-bottom: 10px;
        padding: 12px;
        display: flex;
        align-items: center;
        border-radius: 10px;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }

      li:hover {
        transform: scale(1.02);
      }

      /* Label */
      /* Label rộng hơn + dễ click */
      .task-label {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        cursor: pointer;
        padding: 8px 10px; /* 🔥 thêm padding */
        border-radius: 8px;
        transition: 0.2s;
      }

      /* Hover cho cảm giác click */
      .task-label:hover {
        background: rgba(0, 0, 0, 0.05);
      }

      /* Text */
      .task-text {
        flex: 1;
        padding: 6px 4px; /* 🔥 vùng click lớn hơn */
        line-height: 1.5;
      }

      /* Done */
      .done {
        text-decoration: line-through;
        opacity: 0.5;
        color: #888;
      }

      /* Actions */
      .actions button {
        margin-left: 5px;
      }

      .edit-btn {
        background: #ffb347;
        color: white;
      }

      .delete-btn {
        background: #ff416c;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h2>Todo List Pro 😎</h2>

      <div class="input-group">
        <textarea
          id="taskInput"
          placeholder="Enter"
        ></textarea>
        <button class="add-btn" onclick="addTask()">Thêm</button>
      </div>

      <ul id="taskList"></ul>

      <button class="reset-btn" onclick="resetTasks()">Reset tất cả</button>
    </div>

    <script>
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      function renderTasks() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {
          const li = document.createElement("li");

          li.innerHTML = `
        <label class="task-label">
          <input type="checkbox" ${task.done ? "checked" : ""} onchange="toggleDone(${index})">
          <span class="task-text ${task.done ? "done" : ""}">${task.text}</span>
        </label>
        <div class="actions">
          <button class="edit-btn" onclick="editTask(${index})">Sửa</button>
          <button class="delete-btn" onclick="deleteTask(${index})">Xóa</button>
        </div>
      `;

          list.appendChild(li);
        });
      }

      function addTask() {
        const input = document.getElementById("taskInput");
        const value = input.value.trim();

        if (!value) return;

        tasks.push({
          text: value,
          done: false,
        });

        saveTasks();
        renderTasks();
        input.value = "";
      }

      function deleteTask(index) {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
      }

      function editTask(index) {
        const newTask = prompt("Sửa công việc:", tasks[index].text);
        if (newTask !== null && newTask.trim() !== "") {
          tasks[index].text = newTask.trim();
          saveTasks();
          renderTasks();
        }
      }

      function toggleDone(index) {
        tasks[index].done = !tasks[index].done;
        saveTasks();
        renderTasks();
      }

      function resetTasks() {
        if (confirm("Xóa hết thật không bro? 😏")) {
          tasks = [];
          saveTasks();
          renderTasks();
        }
      }

      // Enter = thêm | Shift+Enter = xuống dòng
      document
        .getElementById("taskInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            addTask();
          }
        });

      renderTasks();
    </script>
  </body>
</html>
